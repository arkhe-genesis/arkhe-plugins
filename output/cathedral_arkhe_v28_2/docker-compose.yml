version: '3.8'

services:
  llm-server:
    build:
      context: .
      dockerfile: Dockerfile.llm-server
    ports:
      - "8000:8000"
    environment:
      - CATHEDRAL_MODEL_PATH=/models
      - LLM_SERVER_PORT=8000
      - RUST_LOG=info
      - TOOL_CALL_MODE=automatic
    volumes:
      - ./models:/models          # montar diretório com modelos .safetensors
      - ./data/llm:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - cathedral-net
    restart: unless-stopped

  agent-runtime:
    build:
      context: .
      dockerfile: Dockerfile.agent-runtime
    ports:
      - "8001:8001"               # API do agente (opcional)
    environment:
      - LLM_SERVER_URL=http://llm-server:8000
      - CATHEDRAL_POLICY_HASH=sha256:example
      - AGENT_MAX_STEPS=50
      - AGENT_MEMORY_CAPACITY=100
      - RUST_LOG=info
      - ORCHESTRATOR_MODE=python   # "rust" ou "python" – aqui usamos Python
    volumes:
      - ./data/agent:/data
      - ./workdir:/workdir
      - ./cathedral_agent_bridge.py:/app/bridge.py
      - ./multi_agent_orchestrator.py:/app/orchestrator.py
      - ./config:/config
    depends_on:
      llm-server:
        condition: service_healthy
    networks:
      - cathedral-net
    restart: unless-stopped

  # Opcionais – para memória vetorial e TemporalChain
  vector-db:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - cathedral-net
    profiles:
      - full

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    networks:
      - cathedral-net
    profiles:
      - full

networks:
  cathedral-net:
    driver: bridge

volumes:
  qdrant-data:
