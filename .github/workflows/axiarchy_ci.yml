name: Axiarchy CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Setup elan
      run: |
        curl https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh -sSf | sh -s -- -y --default-toolchain leanprover/lean4:nightly
        echo "$HOME/.elan/bin" >> $GITHUB_PATH
    - name: Setup Mathlib
      run: |
        lake new axiarchy
        cd axiarchy
        rm lakefile.lean || true
        cat << 'INNER_EOF' >> lakefile.toml
[[require]]
name = "mathlib"
git = "https://github.com/leanprover-community/mathlib4"
INNER_EOF
        cp ../axiarchy_954.lean ./Axiarchy.lean
        lake update
        lake exe cache get || true
        lake build Axiarchy
  build-and-deploy:
    needs: audit
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
    - name: Run Ansible Playbook
      run: |
        echo "Deploying to production..."
        # ansible-playbook ansible/deploy.yml
