apiVersion: apps/v1
kind: Deployment
metadata:
  name: arkhe-agent-os
  labels:
    app: arkhe-agent-os
spec:
  replicas: 3
  selector:
    matchLabels:
      app: arkhe-agent-os
  template:
    metadata:
      labels:
        app: arkhe-agent-os
    spec:
      containers:
      - name: arkhe-agent-os
        image: arkhe/agent-os:latest
        ports:
        - containerPort: 8080
