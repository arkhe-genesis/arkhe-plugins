name: Cathedral AGI Prove Code Changes

on:
  pull_request:
    branches: [ main ]

jobs:
  check-proofs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Get changed files
        id: changed-files
        run: |
          echo "files=$(git diff --name-only origin/main HEAD | xargs)" >> $GITHUB_OUTPUT

      - name: Reject unproven code
        run: |
          python cathedral-agi-omega/ci_cd/reject_unproven.py ${{ steps.changed-files.outputs.files }}
