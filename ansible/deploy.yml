---
- name: Deploy ARKHE to 7 regions
  hosts: localhost
  gather_facts: false
  tasks:
    - name: Deploy Kubernetes Manifests
      kubernetes.core.k8s:
        state: present
        src: "../k8s/deployment.yaml"
      loop:
        - "us-east-1"
        - "eu-west-1"
        - "ap-northeast-1"
        - "sa-east-1"
        - "ap-southeast-2"
        - "eu-central-1"
        - "us-west-2"
