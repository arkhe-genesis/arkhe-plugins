  description: Arquitetura do primeiro processador seguro de nucleo com criptografia pos-quantica embutida. Baseado no ISA RISC-V com extensoes vetoriais e instrucoes aceleradoras. Inclui enclave seguro com hardware root of trust, protecao de integridade de memoria via Merkle tree pos-quantica, side-channel resistance e verificabilidade formal da microarquitetura contra especificacoes Axiarchy.
