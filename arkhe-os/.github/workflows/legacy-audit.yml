name: Legacy Code Audit
on:
  schedule:
    - cron: '0 0 * * 0'  # Semanalmente
  pull_request:
    paths:
      - 'crates/**/*.rs'  # Qualquer mudança em código existente

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run cargo-audit for known vulnerabilities
        run: cargo audit
      - name: Run semantic analysis (AI-assisted)
        run: arkhe-audit --depth=full --model=claude-mythos
      - name: Generate diff report
        run: |
          arkhe-diff --baseline=last_audit.json --current=audit_result.json
          if [ $? -ne 0 ]; then
            echo "⚠️  New suspicious patterns detected"
            exit 1
          fi
